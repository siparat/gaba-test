name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 25.x

      - name: Install deps
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Generate prisma types
        run: npm run generate

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
